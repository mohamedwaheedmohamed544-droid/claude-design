<!-- @dsCard group="Type" viewport="700x200" name="Alexandria — Display" subtitle="Logo & display typeface (Google Fonts)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #fff; padding: 20px; box-sizing: border-box; }
  .wordmark { font-family: 'Alexandria', sans-serif; font-weight: 300; font-size: 52px; color: var(--color-navy-900); letter-spacing: -0.02em; line-height: 1; }
  .sub { font-family: 'Alexandria', sans-serif; font-weight: 300; font-size: 18px; color: var(--color-gray-500); margin-top: 8px; }
  .row { display: flex; gap: 32px; margin-top: 16px; align-items: baseline; }
  .item { font-family: 'Alexandria', sans-serif; color: var(--color-gray-700); }
  .caption { font-size: 10px; color: var(--color-gray-400); margin-top: 2px; font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="wordmark">pureminds</div>
  <div class="sub">العقول الصافية</div>
  <div class="row">
    <div>
      <div class="item" style="font-weight:200;font-size:18px">ExtraLight 200</div>
      <div class="caption">--font-weight-extralight</div>
    </div>
    <div>
      <div class="item" style="font-weight:300;font-size:18px">Light 300</div>
      <div class="caption">Logo weight</div>
    </div>
    <div>
      <div class="item" style="font-weight:400;font-size:18px">Regular 400</div>
      <div class="caption">--font-weight-regular</div>
    </div>
    <div>
      <div class="item" style="font-weight:600;font-size:18px">SemiBold 600</div>
      <div class="caption">--font-weight-semibold</div>
    </div>
    <div>
      <div class="item" style="font-weight:800;font-size:18px">Bold 800</div>
      <div class="caption">Display headlines</div>
    </div>
  </div>
</body>
</html>
