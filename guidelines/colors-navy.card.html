<!-- @dsCard group="Colors" viewport="700x200" name="Navy — Primary Brand" subtitle="Core navy scale from 950 to 50" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; gap: 0; height: 80px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
  .sub { font-size: 9px; opacity: 0.7; margin-top: 1px; }
  .meta { display: flex; gap: 24px; padding: 12px 16px 16px; }
  .token { font-size: 11px; color: var(--color-gray-700); }
  .token strong { color: var(--color-navy-900); font-weight: 600; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--color-navy-950)"><span class="label" style="color:#fff">950</span><span class="sub" style="color:rgba(255,255,255,0.5)">#030F1C</span></div>
  <div class="swatch" style="background:var(--color-navy-900)"><span class="label" style="color:#fff">900</span><span class="sub" style="color:rgba(255,255,255,0.5)">#051D36</span></div>
  <div class="swatch" style="background:var(--color-navy-800)"><span class="label" style="color:#fff">800</span><span class="sub" style="color:rgba(255,255,255,0.5)">#0A2F57</span></div>
  <div class="swatch" style="background:var(--color-navy-700)"><span class="label" style="color:#fff">700</span><span class="sub" style="color:rgba(255,255,255,0.5)">#0D3D6E</span></div>
  <div class="swatch" style="background:var(--color-navy-600)"><span class="label" style="color:#fff">600</span><span class="sub" style="color:rgba(255,255,255,0.5)">#105086</span></div>
  <div class="swatch" style="background:var(--color-navy-500)"><span class="label" style="color:#fff">500</span><span class="sub" style="color:rgba(255,255,255,0.5)">#1467A8</span></div>
  <div class="swatch" style="background:var(--color-navy-400)"><span class="label" style="color:#fff">400</span><span class="sub" style="color:rgba(255,255,255,0.5)">#3381BB</span></div>
  <div class="swatch" style="background:var(--color-navy-300)"><span class="label" style="color:var(--color-navy-900)">300</span><span class="sub" style="color:var(--color-navy-700)">#66A3CC</span></div>
  <div class="swatch" style="background:var(--color-navy-200)"><span class="label" style="color:var(--color-navy-900)">200</span><span class="sub" style="color:var(--color-navy-700)">#99C2DE</span></div>
  <div class="swatch" style="background:var(--color-navy-100)"><span class="label" style="color:var(--color-navy-900)">100</span><span class="sub" style="color:var(--color-navy-700)">#CCE1EF</span></div>
  <div class="swatch" style="background:var(--color-navy-50); border-right: 1px solid var(--color-gray-100)"><span class="label" style="color:var(--color-navy-900)">50</span><span class="sub" style="color:var(--color-navy-700)">#EBF3F9</span></div>
</div>
<div class="meta">
  <div class="token"><strong>--color-navy-900</strong>Primary brand, dark surfaces</div>
  <div class="token"><strong>--color-navy-500</strong>Mid-range navy for accents</div>
  <div class="token"><strong>--color-navy-50</strong>Tinted backgrounds</div>
</div>
</body>
</html>
