<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: white; }
  .row { display: flex; height: 140px; }
  .cell { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--color-gray-100); }
  .cell:last-child { border-right: none; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .icon { width: 32px; height: 32px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
  .wordmark { font-family: 'Alexandria', sans-serif; font-size: 22px; letter-spacing: -0.02em; }
  .wordmark span { font-weight: 300; }
  .wordmark strong { font-weight: 600; }
</style>
</head>
<body>
<div class="row">
  <div class="cell">
    <div class="logo">
      <div class="icon" style="background:var(--color-coral-500)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9h12M9 3l6 6-6 6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wordmark" style="color:var(--color-navy-900)"><span>Pure</span><strong>Pay</strong></div>
    </div>
  </div>
  <div class="cell" style="background:var(--color-navy-900)">
    <div class="logo">
      <div class="icon" style="background:var(--color-coral-500)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9h12M9 3l6 6-6 6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wordmark" style="color:white"><span>Pure</span><strong>Pay</strong></div>
    </div>
  </div>
  <div class="cell" style="background:var(--color-coral-500)">
    <div class="logo">
      <div class="icon" style="background:rgba(255,255,255,0.2)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9h12M9 3l6 6-6 6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wordmark" style="color:white"><span>Pure</span><strong>Pay</strong></div>
    </div>
  </div>
</div>
</body>
</html>
