<!-- @dsCard group="Type" viewport="700x180" name="Arabic Typography" subtitle="RTL support — العقول الصافية" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #fff; padding: 20px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--color-gray-50); }
  .label { font-size: 10px; color: var(--color-gray-400); width: 80px; flex-shrink: 0; }
  .arabic { font-family: var(--font-sans); color: var(--color-gray-900); direction: rtl; text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Display</div>
    <div class="arabic" style="font-size:32px;font-weight:300">العقول الصافية</div>
  </div>
  <div class="row">
    <div class="label">Heading</div>
    <div class="arabic" style="font-size:22px;font-weight:500">إرسال الأموال في ثوانٍ</div>
  </div>
  <div class="row">
    <div class="label">Body</div>
    <div class="arabic" style="font-size:15px;font-weight:400;line-height:1.65">تم تصميم PurePay للأشخاص الذين يقدّرون وقتهم. ادفع في أي وقت، من أي مكان.</div>
  </div>
  <div class="row">
    <div class="label">Caption</div>
    <div class="arabic" style="font-size:11px;font-weight:400;color:var(--color-gray-500)">المبلغ · التاريخ · الحالة</div>
  </div>
</body>
</html>
