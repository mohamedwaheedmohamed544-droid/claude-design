<!-- @dsCard group="Spacing" viewport="700x150" name="Shadows" subtitle="Navy-tinted elevation system — 6 levels" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-gray-50); padding: 24px 20px; font-family: var(--font-sans); box-sizing: border-box; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card { width: 72px; height: 72px; background: white; border-radius: var(--radius-lg); }
  .label { font-size: 9px; color: var(--color-gray-600); font-weight: 600; }
  .token { font-size: 8px; color: var(--color-gray-400); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="card" style="box-shadow:var(--shadow-xs)"></div><div class="label">xs</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-sm)"></div><div class="label">sm</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-md)"></div><div class="label">md · card</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-lg)"></div><div class="label">lg · hover</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-xl)"></div><div class="label">xl · dropdown</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-2xl)"></div><div class="label">2xl · modal</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--focus-ring); border:1px solid var(--color-blue-500)"></div><div class="label">focus ring</div></div>
</div>
</body>
</html>
