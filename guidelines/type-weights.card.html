<!-- @dsCard group="Type" viewport="700x260" name="29LT Zarid Sans — Weights" subtitle="Primary UI typeface, 7 weights" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); padding: 16px 20px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--color-gray-50); }
  .row:last-child { border-bottom: none; }
  .label { font-size: 10px; color: var(--color-gray-400); width: 120px; flex-shrink: 0; }
  .sample { color: var(--color-gray-900); font-size: 22px; }
  .num { font-size: 10px; color: var(--color-gray-300); }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Thin · 100</div>
    <div class="sample" style="font-weight:100">The quick brown fox</div>
    <div class="num">100</div>
  </div>
  <div class="row">
    <div class="label">Extra Light · 200</div>
    <div class="sample" style="font-weight:200">The quick brown fox</div>
    <div class="num">200</div>
  </div>
  <div class="row">
    <div class="label">Light · 300</div>
    <div class="sample" style="font-weight:300">The quick brown fox</div>
    <div class="num">300</div>
  </div>
  <div class="row">
    <div class="label">Regular · 400</div>
    <div class="sample" style="font-weight:400">The quick brown fox</div>
    <div class="num">400</div>
  </div>
  <div class="row">
    <div class="label">Medium · 500</div>
    <div class="sample" style="font-weight:500">The quick brown fox</div>
    <div class="num">500</div>
  </div>
  <div class="row">
    <div class="label">Semi Bold · 600</div>
    <div class="sample" style="font-weight:600">The quick brown fox</div>
    <div class="num">600</div>
  </div>
  <div class="row">
    <div class="label">Black · 900</div>
    <div class="sample" style="font-weight:900">The quick brown fox</div>
    <div class="num">900</div>
  </div>
</body>
</html>
